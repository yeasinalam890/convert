<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Converter & Compressor - Yeasin Alam</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --success: #10b981;
            --bg: #f3f4f6;
            --card: #ffffff;
            --text: #1f2937;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Top Banner Styles */
        .header-banner {
            text-align: center;
            margin-top: 10px;
            margin-bottom: 20px;
        }

        .header-banner h1 {
            margin: 0;
            font-size: 36px;
            color: var(--primary);
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .header-banner p {
            margin: 5px 0 0 0;
            font-size: 18px;
            color: #4b5563;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Main App Container */
        .converter-container {
            background: var(--card);
            padding: 35px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 450px;
            box-sizing: border-box;
            margin-bottom: auto;
        }

        h2 {
            margin-top: 0;
            font-size: 24px;
            text-align: center;
            color: #111827;
        }

        .drop-zone {
            border: 2px dashed #cbd5e1;
            padding: 35px 20px;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            background: #f8fafc;
            transition: all 0.2s ease;
        }

        .drop-zone:hover, .drop-zone.drag-over {
            border-color: var(--primary);
            background: #eef2ff;
        }

        .drop-zone p {
            margin: 0 0 10px 0;
            color: #64748b;
        }

        #fileName {
            display: block;
            word-break: break-all;
            color: var(--primary);
            font-weight: 600;
            margin-top: 8px;
        }

        label {
            display: block;
            font-weight: 500;
            margin-bottom: 6px;
            font-size: 14px;
            color: #4b5563;
        }

        select, button {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }

        select {
            border: 1px solid #d1d5db;
            background-color: #fff;
            margin-bottom: 20px;
            outline: none;
        }

        select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        .option-group {
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 15px;
        }

        .checkbox-container input {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .slider-panel {
            margin-top: 12px;
            display: none;
        }

        .slider-label-row {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: #6b7280;
            margin-bottom: 4px;
        }

        input[type="range"] {
            width: 100%;
            margin: 0;
            cursor: pointer;
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        #status {
            margin-top: 15px;
            text-align: center;
            font-size: 14px;
            font-weight: 500;
        }

        .status-loading { color: var(--primary); }
        .status-success { color: var(--success); }
        .status-error { color: #dc2626; }

        /* Contact Footer Styles */
        .footer-banner {
            text-align: center;
            margin-top: 30px;
            padding-top: 15px;
            border-top: 1px solid #e5e7eb;
            width: 100%;
            max-width: 450px;
            font-size: 14px;
            color: #6b7280;
        }

        .footer-banner a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .footer-banner a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="header-banner">
    <h1>Yeasin Alam</h1>
    <p>File Converter</p>
</div>

<div class="converter-container">
    <h2>Convert & Compress</h2>

    <div class="drop-zone" id="dropZone">
        <p>Drag & drop file here or <strong>browse</strong></p>
        <input type="file" id="fileInput" style="display: none;" accept="image/*">
        <span id="fileName"></span>
    </div>

    <div style="margin-top: 20px;">
        <label for="formatSelect">Output Format</label>
        <select id="formatSelect">
            <option value="">Keep Original Format (Compression Only)</option>
            <option value="jpeg">Convert to JPG (Image)</option>
            <option value="png">Convert to PNG (Image)</option>
            <option value="webp">Convert to WebP (Optimized Image)</option>
        </select>
    </div>

    <div class="option-group">
        <label class="checkbox-container">
            <input type="checkbox" id="compressCheck">
            <span>Enable Optimization / Compression</span>
        </label>

        <div class="slider-panel" id="sliderPanel">
            <div class="slider-label-row">
                <span>Target Quality Level</span>
                <span id="qualityVal">80%</span>
            </div>
            <input type="range" id="qualityRange" min="10" max="100" value="80">
        </div>
    </div>

    <button id="convertBtn">Process & Download</button>
    <div id="status"></div>
</div>

<div class="footer-banner">
    Contact Support: <a href="mailto:yeasinalam890@gmail.com">yeasinalam890@gmail.com</a>
</div>

<script>
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const fileName = document.getElementById('fileName');
    const convertBtn = document.getElementById('convertBtn');
    const formatSelect = document.getElementById('formatSelect');
    const compressCheck = document.getElementById('compressCheck');
    const sliderPanel = document.getElementById('sliderPanel');
    const qualityRange = document.getElementById('qualityRange');
    const qualityVal = document.getElementById('qualityVal');
    const status = document.getElementById('status');

    // UI Interactive Triggers
    dropZone.addEventListener('click', () => fileInput.click());

    dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.classList.add('drag-over');
    });

    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));

    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('drag-over');
        if(e.dataTransfer.files.length) {
            fileInput.files = e.dataTransfer.files;
            updateFileNameDisplay();
        }
    });

    fileInput.addEventListener('change', updateFileNameDisplay);

    function updateFileNameDisplay() {
        if(fileInput.files.length) {
            fileName.textContent = fileInput.files[0].name;
        }
    }

    compressCheck.addEventListener('change', () => {
        sliderPanel.style.display = compressCheck.checked ? 'block' : 'none';
    });

    qualityRange.addEventListener('input', () => {
        qualityVal.textContent = qualityRange.value + '%';
    });

    // Client-side Frontend Image Engine 
    convertBtn.addEventListener('click', () => {
        const file = fileInput.files[0];
        if (!file) {
            alert('Please upload or drop a file first.');
            return;
        }

        status.className = "status-loading";
        status.textContent = "Processing image layouts... Hold tight.";

        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = function (event) {
            const img = new Image();
            img.src = event.target.result;
            img.onload = function () {
                // Initialize canvas processing dimensions
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = img.width;
                canvas.height = img.height;

                // Draw raw matrix representation
                ctx.drawImage(img, 0, 0);

                // Setup targeted MIME layouts
                let targetFormat = formatSelect.value ? `image/${formatSelect.value}` : file.type;
                const quality = compressCheck.checked ? (qualityRange.value / 100) : 0.92;

                try {
                    // Export directly via client data stream URLs
                    const dataUrl = canvas.toDataURL(targetFormat, quality);

                    const a = document.createElement('a');
                    a.href = dataUrl;

                    const downloadExt = formatSelect.value || file.name.split('.').pop();
                    a.download = `processed_${Date.now()}.${downloadExt}`;

                    document.body.appendChild(a);
                    a.click();
                    a.remove();

                    status.className = "status-success";
                    status.textContent = "Done! Enjoy your optimized file.";
                } catch (err) {
                    status.className = "status-error";
                    status.textContent = "Encoding mismatch or format export crash.";
                    console.error(err);
                }
            };
        };
        reader.onerror = function() {
            status.className = "status-error";
            status.textContent = "Local file stream streaming failed.";
        };
    });
</script>
</body>
</html>
