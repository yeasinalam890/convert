<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Converter & Compressor - Yeasin Alam</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.umd.min.js"></script>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --success: #10b981;
            --bg: #f3f4f6;
            --card: #ffffff;
            --text: #1f2937;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Top Banner Styles */
        .header-banner {
            text-align: center;
            margin-top: 10px;
            margin-bottom: 20px;
        }

        .header-banner h1 {
            margin: 0;
            font-size: 36px;
            color: var(--primary);
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .header-banner p {
            margin: 5px 0 0 0;
            font-size: 18px;
            color: #4b5563;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Main App Container */
        .converter-container {
            background: var(--card);
            padding: 35px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 450px;
            box-sizing: border-box;
            margin-bottom: auto;
        }

        h2 {
            margin-top: 0;
            font-size: 24px;
            text-align: center;
            color: #111827;
        }

        .drop-zone {
            border: 2px dashed #cbd5e1;
            padding: 35px 20px;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            background: #f8fafc;
            transition: all 0.2s ease;
        }

        .drop-zone:hover, .drop-zone.drag-over {
            border-color: var(--primary);
            background: #eef2ff;
        }

        .drop-zone p {
            margin: 0 0 10px 0;
            color: #64748b;
        }

        #fileName {
            display: block;
            word-break: break-all;
            color: var(--primary);
            font-weight: 600;
            margin-top: 8px;
            max-height: 120px;
            overflow-y: auto;
            font-size: 13px;
            text-align: left;
            padding: 0 10px;
        }

        label {
            display: block;
            font-weight: 500;
            margin-bottom: 6px;
            font-size: 14px;
            color: #4b5563;
        }

        select, button {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }

        select {
            border: 1px solid #d1d5db;
            background-color: #fff;
            margin-bottom: 20px;
            outline: none;
        }

        select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        .option-group {
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 15px;
        }

        .checkbox-container input {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .slider-panel {
            margin-top: 12px;
            display: none;
        }

        .slider-label-row {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: #6b7280;
            margin-bottom: 4px;
        }

        input[type="range"] {
            width: 100%;
            margin: 0;
            cursor: pointer;
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        #status {
            margin-top: 15px;
            text-align: center;
            font-size: 14px;
            font-weight: 500;
            white-space: pre-line;
        }
        
        .status-loading { color: var(--primary); }
        .status-success { color: var(--success); }
        .status-error { color: #dc2626; }

        /* Contact Footer Styles */
        .footer-banner {
            text-align: center;
            margin-top: 30px;
            padding-top: 15px;
            border-top: 1px solid #e5e7eb;
            width: 100%;
            max-width: 450px;
            font-size: 14px;
            color: #6b7280;
        }

        .footer-banner a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .footer-banner a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="header-banner">
    <h1>Yeasin Alam</h1>
    <p>File Converter</p>
</div>

<div class="converter-container">
    <h2>Convert & Compress</h2>
    
    <div class="drop-zone" id="dropZone">
        <p>Drag & drop any image, doc, or PDF here or <strong>browse</strong></p>
        <input type="file" id="fileInput" style="display: none;" accept="image/*,.doc,.docx,.pdf" multiple>
        <span id="fileName"></span>
    </div>

    <div style="margin-top: 20px;">
        <label for="formatSelect">Output Format Target</label>
        <select id="formatSelect">
            <option value="">Keep Original Format (Compression Only)</option>
            <option value="jpeg">Convert to JPG (Image)</option>
            <option value="png">Convert to PNG (Image)</option>
            <option value="webp">Convert to WebP (Optimized Image)</option>
            <option value="pdf">Convert to PDF (Document)</option>
            <option value="docx">Convert to Word DOCX (MS Office Document)</option>
        </select>
    </div>

    <div class="option-group">
        <label class="checkbox-container">
            <input type="checkbox" id="compressCheck">
            <span>Enable Optimization / Compression</span>
        </label>
        
        <div class="slider-panel" id="sliderPanel">
            <div class="slider-label-row">
                <span>Target Quality Level</span>
                <span id="qualityVal">80%</span>
            </div>
            <input type="range" id="qualityRange" min="10" max="100" value="80">
        </div>
    </div>

    <button id="convertBtn">Process & Download</button>
    <div id="status"></div>
</div>

<div class="footer-banner">
    Contact Support: <a href="mailto:yeasinalam890@gmail.com">yeasinalam890@gmail.com</a>
</div>

<script>
    // Initialize PDFJS Worker config mapping
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const fileName = document.getElementById('fileName');
    const convertBtn = document.getElementById('convertBtn');
    const formatSelect = document.getElementById('formatSelect');
    const compressCheck = document.getElementById('compressCheck');
    const sliderPanel = document.getElementById('sliderPanel');
    const qualityRange = document.getElementById('qualityRange');
    const qualityVal = document.getElementById('qualityVal');
    const status = document.getElementById('status');

    // UI Interactive Triggers
    dropZone.addEventListener('click', () => fileInput.click());
    
    dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.classList.add('drag-over');
    });

    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));

    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('drag-over');
        if(e.dataTransfer.files.length) {
            fileInput.files = e.dataTransfer.files;
            updateFileNameDisplay();
        }
    });

    fileInput.addEventListener('change', updateFileNameDisplay);

    function updateFileNameDisplay() {
        const totalFiles = fileInput.files.length;
        if(totalFiles === 1) {
            fileName.textContent = `📄 ${fileInput.files[0].name}`;
        } else if (totalFiles > 1) {
            fileName.innerHTML = `<strong>Selected ${totalFiles} files:</strong><br>` + 
                Array.from(fileInput.files).map(f => `• ${f.name}`).join('<br>');
        } else {
            fileName.textContent = "";
        }
    }

    compressCheck.addEventListener('change', () => {
        sliderPanel.style.display = compressCheck.checked ? 'block' : 'none';
    });

    qualityRange.addEventListener('input', () => {
        qualityVal.textContent = qualityRange.value + '%';
    });

    function loadImage(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => resolve(img);
                img.onerror = (err) => reject(err);
            };
            reader.onerror = (err) => reject(err);
        });
    }

    function readFileAsBuffer(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsArrayBuffer(file);
            reader.onload = (e) => resolve(e.target.result);
            reader.onerror = (err) => reject(err);
        });
    }

    // Helper to generate docx image blocks cleanly via Blob formats
    function getBlobFromCanvas(canvas, mime, quality) {
        return new Promise(resolve => canvas.toBlob(resolve, mime, quality));
    }

    // Main Processing Engine
    convertBtn.addEventListener('click', async () => {
        const files = fileInput.files;
        if (!files.length) {
            alert('Please select files first.');
            return;
        }

        status.className = "status-loading";
        let successCount = 0;

        for (let i = 0; i < files.length; i++) {
            const file = files[i];
            const fileExt = file.name.split('.').pop().toLowerCase();
            const baseName = file.name.substring(0, file.name.lastIndexOf('.')) || file.name;
            const targetFormat = formatSelect.value;
            const quality = compressCheck.checked ? (qualityRange.value / 100) : 0.92;

            status.textContent = `Processing file ${i + 1} of ${files.length}...\n(${file.name})`;

            try {
                // ==========================================
                // BRANCH 1: TARGETING WORD DOCX AS OUTPUT
                // ==========================================
                if (targetFormat === 'docx') {
                    let imageBlobsArray = [];

                    // Case A: Input is a PDF file
                    if (fileExt === 'pdf') {
                        const arrayBuffer = await readFileAsBuffer(file);
                        const loadingTask = pdfjsLib.getDocument({ data: new Uint8Array(arrayBuffer) });
                        const pdf = await loadingTask.promise;

                        for (let p = 1; p <= pdf.numPages; p++) {
                            const page = await pdf.getPage(p);
                            const viewport = page.getViewport({ scale: 1.5 });
                            const canvas = document.createElement('canvas');
                            canvas.height = viewport.height;
                            canvas.width = viewport.width;
                            await page.render({ canvasContext: ctx = canvas.getContext('2d'), viewport }).promise;
                            
                            const blob = await getBlobFromCanvas(canvas, 'image/jpeg', quality);
                            imageBlobsArray.push({ blob, w: canvas.width, h: canvas.height });
                        }
                    } 
                    // Case B: Input is a Word Doc file already
                    else if (fileExt === 'docx' || fileExt === 'doc') {
                        // Omit or direct download original
                        const arrayBuffer = await readFileAsBuffer(file);
                        const blob = new Blob([arrayBuffer], { type: file.type });
                        imageBlobsArray = null; 
                        triggerDownload(URL.createObjectURL(blob), `${baseName}_copy.${fileExt}`);
                    } 
                    // Case C: Input is standard Image structure
                    else {
                        const img = await loadImage(file);
                        const canvas = document.createElement('canvas');
                        canvas.width = img.width; canvas.height = img.height;
                        canvas.getContext('2d').drawImage(img, 0, 0);
                        const blob = await getBlobFromCanvas(canvas, 'image/jpeg', quality);
                        imageBlobsArray.push({ blob, w: img.width, h: img.height });
                    }

                    // Pack resolved image layout targets into docx paragraphs elements
                    if (imageBlobsArray && imageBlobsArray.length) {
                        const childrenElements = imageBlobsArray.map(imgData => {
                            // Scale down dimensions to fit nicely within standard Word page widths (approx 550 max)
                            const scaleFactor = imgData.w > 550 ? (550 / imgData.w) : 1;
                            return new docx.Paragraph({
                                children: [
                                    new docx.ImageRun({
                                        data: imgData.blob,
                                        transformation: { width: imgData.w * scaleFactor, height: imgData.h * scaleFactor }
                                    })
                                ]
                            });
                        });

                        const doc = new docx.Document({ sections: [{ children: childrenElements }] });
                        const docBlob = await docx.Packer.toBlob(doc);
                        triggerDownload(URL.createObjectURL(docBlob), `${baseName}_converted_${Date.now()}.docx`);
                    }
                    successCount++;
                }
                // ==========================================
                // BRANCH 2: TARGETING IMAGES OR PDF AS OUTPUT
                // ==========================================
                else {
                    // Case A: Input is PDF file structure
                    if (fileExt === 'pdf') {
                        const arrayBuffer = await readFileAsBuffer(file);
                        const pdf = await pdfjsLib.getDocument({ data: new Uint8Array(arrayBuffer) }).promise;

                        for (let p = 1; p <= pdf.numPages; p++) {
                            const page = await pdf.getPage(p);
                            const viewport = page.getViewport({ scale: 2.0 });
                            const canvas = document.createElement('canvas');
                            canvas.height = viewport.height; canvas.width = viewport.width;
                            await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
                            
                            const outFormat = targetFormat || 'jpeg';
                            triggerDownload(canvas.toDataURL(`image/${outFormat}`, quality), `${baseName}_page_${p}_${Date.now()}.${outFormat}`);
                        }
                        successCount++;
                    }
                    // Case B: Input is Word Document Structure
                    else if (fileExt === 'docx' || fileExt === 'doc') {
                        const arrayBuffer = await readFileAsBuffer(file);
                        const result = await mammoth.convertToHtml({ arrayBuffer });
                        
                        if (targetFormat === 'pdf' || targetFormat === '') {
                            const pdf = new jspdf.jsPDF({ orientation: 'p', unit: 'pt', format: 'a4' });
                            await pdf.html(result.value, { x: 40, y: 40, width: 515, windowWidth: 650 });
                            pdf.save(`${baseName}_converted_${Date.now()}.pdf`);
                        } else {
                            // Render parsed document text onto canvas to output an image format option
                            const canvas = document.createElement('canvas');
                            canvas.width = 800; canvas.height = 1000;
                            const ctx = canvas.getContext('2d');
                            ctx.fillStyle = "white"; ctx.fillRect(0,0,800,1000);
                            ctx.fillStyle = "black"; ctx.font = "16px Arial";
                            
                            // Strip tags and split into lines for simple fallback image printing
                            const cleanText = result.value.replace(/<[^>]*>/g, '\n');
                            const lines = cleanText.split('\n').filter(l => l.trim() !== '');
                            lines.forEach((line, index) => { ctx.fillText(line, 40, 50 + (index * 25)); });

                            triggerDownload(canvas.toDataURL(`image/${targetFormat}`, quality), `${baseName}_converted_${Date.now()}.${targetFormat}`);
                        }
                        successCount++;
                    }
                    // Case C: Input is image file structure
                    else {
                        const img = await loadImage(file);
                        const canvas = document.createElement('canvas');
                        canvas.width = img.width; canvas.height = img.height;
                        canvas.getContext('2d').drawImage(img, 0, 0);

                        if (targetFormat === 'pdf') {
                            const pdf = new jspdf.jsPDF({ orientation: img.width > img.height ? 'l' : 'p', unit: 'px', format: [img.width, img.height] });
                            pdf.addImage(canvas.toDataURL('image/jpeg', quality), 'JPEG', 0, 0, img.width, img.height);
                            pdf.save(`${baseName}_processed_${Date.now()}.pdf`);
                        } else {
                            let mime = targetFormat ? `image/${targetFormat}` : file.type;
                            let ext = targetFormat || fileExt;
                            triggerDownload(canvas.toDataURL(mime, quality), `${baseName}_processed_${Date.now()}.${ext}`);
                        }
                        successCount++;
                    }
                }
            } catch (err) {
                console.error(`Error processing asset index array references ${i}:`, err);
            }
        }

        if (successCount === files.length) {
            status.className = "status-success";
            status.textContent = `Success! Processed and downloaded ${successCount} files safely.`;
        } else {
            status.className = "status-error";
            status.textContent = `Completed processing chain with dropped files. check log console records.`;
        }
    });

    function triggerDownload(url, filename) {
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        a.remove();
    }
</script>
</body>
</html>
